<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mitspielen – SRH Quiz</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    body { display: flex; flex-direction: column; }
    .play-shell { flex: 1; display: flex; flex-direction: column; }
    .screen { flex: 1; display: flex; flex-direction: column; }
    .start-screen, .result-screen, .question-screen {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
      position: relative;
      z-index: 1;
    }
    .start-screen { justify-content: center; min-height: calc(100vh - 90px); }
    .start-logo {
      width: 88px;
      height: 88px;
      border-radius: 28px;
      background: var(--grad-primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 900;
      margin: 0 auto 1.5rem;
      box-shadow: 0 10px 35px rgba(0,105,153,.35);
    }
    .answer-option {
      min-height: 72px;
      font-size: 1rem;
      align-items: center;
      border: none;
      background: var(--glass);
      cursor: pointer;
      text-align: left;
      transition: transform .15s, background .2s, border-color .2s;
      -webkit-tap-highlight-color: transparent;
      border: 2px solid var(--glass-border);
    }
    .answer-option:active:not(:disabled) { transform: scale(.97); }
    .answer-option:nth-child(1) .answer-letter { background: #006999; color:#fff; }
    .answer-option:nth-child(2) .answer-letter { background: #d44407; color:#fff; }
    .answer-option:nth-child(3) .answer-letter { background: #0f7e7c; color:#fff; }
    .answer-option:nth-child(4) .answer-letter { background: #9cbed9; color:#072033; }
    .answer-option:nth-child(5) .answer-letter { background: #1d4ed8; color:#fff; }
    .answer-option:nth-child(6) .answer-letter { background: #dc2626; color:#fff; }
    #q-text {
      font-size: clamp(1.15rem, 4vw, 1.7rem);
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
      padding: 1rem .5rem;
    }
    #q-feedback {
      background: rgba(156,190,217,.14);
      border: 1px solid rgba(156,190,217,.28);
      border-radius: var(--r);
      padding: .8rem 1rem;
      text-align: center;
      font-weight: 600;
      color: var(--primary-light);
    }
    .question-actions { display:flex; justify-content:center; }
    .question-actions .btn { min-width: 220px; }
  </style>
</head>
<body>
<div class="stars-bg" id="stars"></div>

<nav class="navbar">
  <a href="index.html" class="logo">SRH Quiz</a>
  <div class="nav-links">
    <a href="admin.html" class="btn btn-ghost btn-sm">Admin</a>
  </div>
</nav>

<div class="play-shell">
  <div id="screen-start" class="screen hidden">
    <div class="start-screen text-center">
      <div class="start-logo">SRH</div>
      <div class="hero-badge">Messemodus · Einzelspiel · Direkt startklar</div>
      <h1 id="start-title" class="hero-title" style="font-size:clamp(2rem,6vw,3.4rem)">SRH Quiz</h1>
      <p id="start-description" class="hero-sub">Bereit für ein kurzes SRH Messe-Quiz.</p>
      <div class="card" style="max-width:520px;margin:0 auto 1rem">
        <div class="section-title">Quiz-Info</div>
        <div class="flex justify-between items-center wrap gap-1">
          <span class="text-muted">Umfang</span>
          <strong id="start-question-count">0 Fragen</strong>
        </div>
      </div>
      <div class="flex gap-2 justify-center wrap">
        <button id="btn-start-quiz" class="btn btn-primary btn-lg" onclick="startQuizRun()">▶ Quiz starten</button>
        <a href="admin.html" class="btn btn-ghost btn-lg">Zur Admin-Ansicht</a>
      </div>
    </div>
  </div>

  <div id="screen-question" class="screen hidden">
    <div class="question-screen">
      <div class="question-header-bar">
        <div class="flex flex-col gap-1" style="min-width:0">
          <div class="flex items-center gap-1">
            <span class="badge badge-purple" id="q-progress">1 / 5</span>
          </div>
          <div class="progress-bar" style="width:180px;max-width:100%">
            <div class="progress-bar-fill" id="q-progress-fill" style="width:0%"></div>
          </div>
        </div>

        <div class="timer-ring" style="width:72px;height:72px;flex-shrink:0">
          <svg width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="28" fill="none" stroke="var(--glass-border)" stroke-width="5"/>
            <circle id="timer-arc" cx="36" cy="36" r="28" fill="none" stroke="var(--primary-light)" stroke-width="5" stroke-linecap="round" style="transition:stroke-dashoffset .9s linear, stroke .3s"/>
          </svg>
          <span class="timer-text" id="timer-text">30</span>
        </div>

        <div class="score-pill">⭐ <span id="q-score">0</span></div>
      </div>

      <div class="card" style="padding:.75rem 1rem;margin-top:1rem">
        <p id="q-text">Frage wird geladen…</p>
      </div>

      <div id="q-answers" class="answers-list" style="flex:1;min-height:200px;margin-top:1rem"></div>
      <div id="q-feedback" class="hidden" style="margin-top:1rem"></div>
      <div class="question-actions" style="margin-top:1rem">
        <button id="btn-next-step" class="btn btn-primary hidden" type="button">▶ Weiter</button>
      </div>
    </div>
  </div>

  <div id="screen-final" class="screen hidden">
    <div class="result-screen">
      <div class="result-icon" id="final-icon">🏆</div>
      <h2 style="font-size:2rem;font-weight:900">SRH Quiz beendet</h2>
      <div class="card" style="text-align:center;min-width:240px;margin-top:1rem">
        <div class="text-muted text-sm">Dein Ergebnis</div>
        <div style="font-size:3rem;font-weight:900;color:var(--amber)" id="final-score">0</div>
        <div class="text-muted" id="final-rank">Danke fürs Mitmachen!</div>
      </div>

      <div style="width:100%;max-width:480px;margin-top:1rem">
        <h3 class="section-title text-center">Zusammenfassung</h3>
        <div id="final-lb" class="leaderboard"></div>
      </div>

      <div class="flex gap-2 wrap justify-center" style="margin-top:1.5rem">
        <button class="btn btn-primary" onclick="restartQuiz()">🔄 Neu starten</button>
        <a href="admin.html" class="btn btn-ghost">Admin öffnen</a>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/common.js"></script>
<script src="js/play.js"></script>
</body>
</html>
